---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages:
          - pre-commit
      - id: end-of-file-fixer
        stages:
          - pre-commit
      - id: check-yaml
        stages:
          - pre-commit
      - id: check-added-large-files
        exclude: uv.lock
        stages:
          - pre-commit
      - id: check-json
        stages:
          - pre-commit
      - id: check-merge-conflict
        stages:
          - pre-commit
      - id: check-toml
        stages:
          - pre-commit
      - id: debug-statements
        stages:
          - pre-commit
      - id: mixed-line-ending
        stages:
          - pre-commit
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args:
          - '--fix'
          - '--exit-non-zero-on-fix'
        exclude: ^(.*\.md|dependencies_docs/)
        stages:
          - pre-commit
      - id: ruff-format
        exclude: ^(.*\.md|dependencies_docs/)
        stages:
          - pre-commit
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args:
          - '--fail-under=100'
          - '-v'
          - 'ai_pipeline_core'
        pass_filenames: false
        stages:
          - pre-commit
  - repo: local
    hooks:
      - id: vulture
        name: vulture dead code check
        entry: vulture ai_pipeline_core/ .vulture_whitelist.py --min-confidence 80
        language: system
        types:
          - python
        pass_filenames: false
        stages:
          - pre-commit
      - id: semgrep
        name: semgrep custom rules
        entry: semgrep --config .semgrep/ ai_pipeline_core/ tests/ --error --quiet
        language: system
        types:
          - python
        pass_filenames: false
        stages:
          - pre-commit
      - id: basedpyright
        name: basedpyright (source)
        entry: basedpyright
        language: system
        types:
          - python
        pass_filenames: false
        fail_fast: true
        stages:
          - pre-commit
      - id: basedpyright-tests
        name: basedpyright (tests, errors only)
        entry: basedpyright --level error -p pyrightconfig.tests.json
        language: system
        types:
          - python
        pass_filenames: false
        stages:
          - pre-commit
      - id: check-ai-docs
        name: check .ai-docs/ freshness
        entry: >-
          bash -c 'python -m docs_generator generate > /dev/null 2>&1 || true;
          if ! git diff --quiet -- .ai-docs/; then
          echo "ERROR: .ai-docs/ is stale after regeneration.";
          echo "Run: make docs-ai-build && git add .ai-docs/";
          exit 1; fi'
        language: system
        pass_filenames: false
        files: \.py$
        stages:
          - pre-commit
      - id: test-collect
        name: verify all test modules importable
        entry: pytest --collect-only -q --no-header
        language: system
        pass_filenames: false
        files: \.py$
        stages:
          - pre-commit
