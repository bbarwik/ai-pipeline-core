rules:
  - id: mutable-field-on-frozen-pydantic-model
    patterns:
      - pattern-inside: |
          class $CLASS(...):
              ...
              model_config = ConfigDict(..., frozen=True, ...)
              ...
      - pattern-not-inside: |
          def $METHOD(...):
              ...
      - pattern-either:
          - pattern: "$FIELD: list[$T] = ..."
          - pattern: "$FIELD: list[$T]"
          - pattern: "$FIELD: dict[$K, $V] = ..."
          - pattern: "$FIELD: set[$T] = ..."
    message: "Mutable collection type on frozen Pydantic model — use tuple/frozenset"
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        # Replay payloads use dict[str, Any] for YAML-deserialized arbitrary data
        - "**/replay/types.py"

  - id: mutable-field-default
    pattern-either:
      - pattern: Field(default=[], ...)
      - pattern: Field(default={}, ...)
      - pattern: Field(default=set(), ...)
      - pattern: Field(default=[...], ...)
      - pattern: Field(default={...}, ...)
    message: "Mutable default in Field() — use default_factory instead: Field(default_factory=list)"
    severity: WARNING
    languages: [python]
